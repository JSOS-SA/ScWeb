<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>برنامج حافلات صالة الحج | بوابة ١٤</title>

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="lib/tabulator.min.css">

  <script>
    window.__errors = [];

    window.addEventListener('error', function(e) {
      var src = e.filename || '?';
      var line = (e.lineno || '?') + ':' + (e.colno || '?');
      window.__errors.push((e.message || 'unknown') + ' @ ' + src + ':' + line);
    });

    window.addEventListener('unhandledrejection', function(e) {
      var r = e.reason;
      var msg = (r && r.message) ? r.message : String(r);
      if (r && r.stack) msg += '\n' + r.stack;
      window.__errors.push('Promise: ' + msg);
    });
  </script>

  <script src="lib/dexie.min.js"></script>
  <script src="lib/xlsx.full.min.js"></script>
</head>
<body>

  <header class="app-header" id="app-header"></header>

  <div class="app-shell">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <main class="app-main" id="app-main">
      <div class="loading">جارٍ تحضير النظام...</div>
    </main>
  </div>

  <script>
    var FILES = [
      'js/main.js',
      'js/db/database.js',
      'js/db/seed.js',
      'js/db/schema.js',
      'js/ui/router.js',
      'js/ui/page-home.js',
      'js/ui/page-import.js',
      'js/utils/dom.js',
      'js/utils/time.js',
      'js/utils/format.js',
      'js/core/constants.js',
      'js/core/columns.js',
      'js/core/lists.js',
      'js/core/shifts.js',
      'js/core/diagnostics.js',
      'js/core/validators.js',
      'js/services/records.js',
      'js/services/stats.js',
      'js/services/import-xlsx.js'
    ];

    function render(rows, errors) {
      var html = '<div style="padding:16px;background:#fff;color:#000;font-family:monospace;direction:ltr;text-align:left;font-size:13px;border:2px solid #333;margin:8px;">';
      html += '<div style="font-family:Tahoma;font-size:16px;color:#000;margin-bottom:10px;direction:rtl;text-align:right;"><strong>تشخيص الملفات</strong></div>';
      html += '<div>Dexie: ' + (window.Dexie ? 'OK' : 'MISSING') + '</div>';
      html += '<div>XLSX: ' + (window.XLSX ? 'OK' : 'MISSING') + '</div>';
      html += '<hr>';
      rows.forEach(function(r) {
        var color = (r.status === 200) ? '#070' : '#c00';
        html += '<div style="color:' + color + '">' + r.status + '  ' + r.file + (r.size ? '  (' + r.size + 'b)' : '') + '</div>';
      });
      if (errors && errors.length) {
        html += '<hr><div style="color:#c00;direction:ltr;text-align:left;white-space:pre-wrap;">';
        html += '<strong>JS Errors:</strong>\n' + errors.join('\n----\n');
        html += '</div>';
      }
      html += '</div>';
      document.getElementById('app-main').innerHTML = html;
    }

    setTimeout(function() {
      var main = document.getElementById('app-main');
      if (!main) return;
      if (main.textContent.indexOf('جارٍ تحضير النظام') === -1) return;

      var results = [];
      var remaining = FILES.length;

      FILES.forEach(function(f) {
        fetch(f).then(function(r) {
          if (r.status === 200) {
            return r.text().then(function(t) {
              results.push({ file: f, status: 200, size: t.length });
            });
          } else {
            results.push({ file: f, status: r.status });
          }
        }).catch(function(e) {
          results.push({ file: f, status: 'ERR: ' + e.message });
        }).finally(function() {
          remaining--;
          if (remaining === 0) {
            results.sort(function(a, b) { return a.file.localeCompare(b.file); });
            render(results, window.__errors);
          }
        });
      });
    }, 3500);
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
